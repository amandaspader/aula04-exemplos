<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <title>Array Associativo - Exemplo 02</title>
</head>
<body>
    
    <h1>Array Associativo</h1>
    <h2>Exemplo 02</h2>

    <form method="POST" action="array-dois-contatos.php">
        <table>
            <tr>
                <td><label>Nome Contato 1:</label></td>
                <td><input type="text" name="nome1" required/></td>
            </tr>
            <tr>
                <td><label>Telefone:</label></td>
                <td><input type="text" name="telefone1" maxlength="12" required/></td>
            </tr>
            <tr>
                <td><label>E-mail:</label></td>
                <td><input type="email" name="email1" required/></td>
            </tr>
            <tr>
                <td><label>Nome Contato 2:</label></td>
                <td><input type="text" name="nome2" required/></td>
            </tr>
            <tr>
                <td><label>Telefone:</label></td>
                <td><input type="text" name="telefone2" maxlength="12" required/></td>
            </tr>
            <tr>
                <td><label>E-mail:</label></td>
                <td><input type="email" name="email2" required/></td>
            </tr>
        </table>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>
</html>
